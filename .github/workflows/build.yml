name: innoextract CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    # Forced to run on debian:buster since debian:bullseye's Boost is not
    # functional to compile executables statically with bz2 and zlib.
    container: debian:buster
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential cmake libboost-all-dev liblzma-dev
          # Only because we are running on debian:buster
          apt-get install -y zlib1g-dev libbz2-dev
      - name: Build innoextract
        run: |
          mkdir -p build 
          cd build
          cmake -DUSE_STATIC_LIBS=ON ..
          make
          strip innoextract
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: innoextract
          path: build/innoextract
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/innoextract

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static -DUSE_STATIC_LIBS=ON

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: innoextract-windows
          path: build/Release/innoextract.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/Release/innoextract.exe
